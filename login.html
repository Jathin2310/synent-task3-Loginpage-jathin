<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,400&family=Outfit:wght@300;400;500;600&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #f7f4ef;
  --ink: #18120e;
  --accent: #c4521a;
  --muted: #9a8878;
  --border: #ddd5c8;
  --font-display: 'Playfair Display', serif;
  --font-body: 'Outfit', sans-serif;
  --font-mono: 'DM Mono', monospace;
}

body {
  min-height: 100vh;
  background: var(--bg);
  font-family: var(--font-body);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 2rem;
}

.card {
  width: 100%;
  max-width: 420px;
  animation: fadeUp 0.7s cubic-bezier(0.4,0,0.2,1) both;
}

/* Top bar accent */
.card-bar {
  height: 3px;
  background: var(--accent);
  width: 48px;
  margin-bottom: 2.5rem;
}

.greeting {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 0.6rem;
}

.title {
  font-family: var(--font-display);
  font-size: 2.8rem;
  font-weight: 600;
  letter-spacing: -0.03em;
  line-height: 1;
  color: var(--ink);
  margin-bottom: 0.4rem;
}
.title em {
  font-style: italic;
  font-weight: 400;
  color: var(--muted);
}

.subtitle {
  font-size: 0.88rem;
  color: var(--muted);
  font-weight: 300;
  margin-bottom: 2.8rem;
}

/* Fields */
.field { margin-bottom: 1.6rem; }

.field label {
  display: block;
  font-family: var(--font-mono);
  font-size: 0.65rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 0.55rem;
}

.field-wrap { position: relative; }

.field input {
  width: 100%;
  padding: 0.8rem 2.4rem 0.8rem 0;
  background: transparent;
  border: none;
  border-bottom: 1.5px solid var(--border);
  color: var(--ink);
  font-family: var(--font-body);
  font-size: 0.95rem;
  outline: none;
  transition: border-color 0.3s;
  caret-color: var(--accent);
}
.field input::placeholder { color: #c5bbb1; font-weight: 300; }
.field input:focus { border-color: var(--accent); }

/* animated line */
.line {
  position: absolute;
  bottom: 0; left: 0;
  height: 1.5px; width: 0;
  background: var(--accent);
  transition: width 0.4s ease;
}
.field input:focus ~ .line { width: 100%; }

/* eye toggle */
.eye {
  position: absolute;
  right: 0; top: 50%;
  transform: translateY(-50%);
  background: none; border: none;
  cursor: pointer;
  color: var(--border);
  padding: 2px;
  transition: color 0.2s;
  display: flex;
}
.eye:hover { color: var(--ink); }
.eye svg { width: 17px; height: 17px; stroke: currentColor; fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }

/* Row */
.row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin: 0.2rem 0 2.2rem;
}

.check-label {
  display: flex; align-items: center; gap: 0.45rem;
  font-size: 0.82rem; color: var(--muted);
  font-weight: 300; cursor: pointer; user-select: none;
}
.check {
  width: 15px; height: 15px;
  border: 1.5px solid var(--border);
  appearance: none; -webkit-appearance: none;
  cursor: pointer; position: relative;
  transition: background 0.2s, border-color 0.2s;
  flex-shrink: 0;
}
.check:checked { background: var(--accent); border-color: var(--accent); }
.check:checked::after {
  content: '';
  position: absolute;
  top: 1px; left: 3px;
  width: 5px; height: 8px;
  border: 2px solid #fff;
  border-top: none; border-left: none;
  transform: rotate(45deg);
}

.forgot {
  font-size: 0.82rem; color: var(--muted);
  text-decoration: none; font-weight: 400;
  border-bottom: 1px solid transparent;
  padding-bottom: 1px;
  transition: color 0.2s, border-color 0.2s;
}
.forgot:hover { color: var(--accent); border-color: var(--accent); }

/* Button */
.btn {
  width: 100%;
  padding: 0.9rem;
  background: var(--ink);
  color: var(--bg);
  border: none;
  font-family: var(--font-body);
  font-size: 0.88rem;
  font-weight: 600;
  letter-spacing: 0.06em;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transition: color 0.35s;
}
.btn::before {
  content: '';
  position: absolute; inset: 0;
  background: var(--accent);
  transform: translateX(-100%);
  transition: transform 0.4s cubic-bezier(0.4,0,0.2,1);
}
.btn:hover::before { transform: translateX(0); }
.btn-inner {
  position: relative; z-index: 1;
  display: flex; align-items: center; justify-content: center; gap: 0.5rem;
}
.arrow { transition: transform 0.3s; }
.btn:hover .arrow { transform: translateX(4px); }
.btn:active { transform: scale(0.99); }

/* Register */
.register {
  text-align: center;
  margin-top: 2rem;
  font-size: 0.82rem;
  color: var(--muted);
  font-weight: 300;
}
.register a {
  color: var(--ink);
  font-weight: 600;
  text-decoration: none;
  border-bottom: 1.5px solid var(--ink);
  padding-bottom: 1px;
  transition: color 0.2s, border-color 0.2s;
}
.register a:hover { color: var(--accent); border-color: var(--accent); }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(24px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes shake {
  0%,100% { transform: translateX(0); }
  25%      { transform: translateX(-6px); }
  75%      { transform: translateX(6px); }
}
@keyframes spin {
  to { transform: rotate(360deg); }
}
</style>
</head>
<body>

<div class="card">
  <div class="card-bar"></div>

  <p class="greeting">Welcome back</p>
  <h1 class="title">Sign <em>in.</em></h1>
  <p class="subtitle">Good to see you again. Let's pick up where you left off.</p>

  <!-- Email -->
  <div class="field">
    <label for="email">Email Address</label>
    <div class="field-wrap">
      <input id="email" type="email" placeholder="you@example.com" autocomplete="email">
      <div class="line"></div>
    </div>
  </div>

  <!-- Password -->
  <div class="field">
    <label for="password">Password</label>
    <div class="field-wrap">
      <input id="password" type="password" placeholder="••••••••" autocomplete="current-password">
      <div class="line"></div>
      <button class="eye" id="eyeBtn" type="button" aria-label="Toggle password">
        <svg id="eyeIcon" viewBox="0 0 24 24">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Options -->
  <div class="row">
    <label class="check-label">
      <input class="check" type="checkbox"> Remember me
    </label>
    <a href="#" class="forgot">Forgot password?</a>
  </div>

  <!-- Submit -->
  <button class="btn" id="loginBtn" type="button">
    <div class="btn-inner">
      <span id="btnText">Sign In</span>
      <span class="arrow" id="btnArrow">→</span>
    </div>
  </button>

  <div class="register">
    No account? <a href="#">Create one</a>
  </div>
</div>

<script>
  // Eye toggle
  document.getElementById('eyeBtn').addEventListener('click', function() {
    const input = document.getElementById('password');
    const icon  = document.getElementById('eyeIcon');
    const show  = input.type === 'password';
    input.type  = show ? 'text' : 'password';
    icon.innerHTML = show
      ? `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>`
      : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
  });

  // Login
  document.getElementById('loginBtn').addEventListener('click', function() {
    const email = document.getElementById('email').value.trim();
    const pass  = document.getElementById('password').value.trim();
    const btn   = this;

    if (!email || !pass) {
      btn.style.animation = 'shake 0.35s ease';
      setTimeout(() => btn.style.animation = '', 400);
      return;
    }

    document.getElementById('btnText').textContent = 'Signing in...';
    document.getElementById('btnArrow').style.cssText =
      'display:inline-block;animation:spin 0.7s linear infinite;margin-left:2px';

    setTimeout(() => {
      document.getElementById('btnText').textContent = '✓  Welcome back!';
      document.getElementById('btnArrow').style.display = 'none';
      btn.style.background = '#2d6a4f';
      btn.querySelector('::before') // already filled
    }, 1800);
  });
</script>
</body>
</html>
